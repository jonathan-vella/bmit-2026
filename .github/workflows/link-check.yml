# Link Check Workflow
# Validates all hyperlinks in docs/ are reachable
# Separated from validate:all to isolate network-dependent checks from code quality gates

name: link-check

on:
  pull_request:
    branches: [main]
    paths:
      - "site/src/content/docs/**"
      - ".markdown-link-check.json"
      - ".markdown-link-check-site.json"
  push:
    branches: [main]
    paths:
      - "site/src/content/docs/**"
      - ".markdown-link-check.json"
      - ".markdown-link-check-site.json"
  schedule:
    # Run weekly on Monday at 08:00 UTC (staggered: deprecation 06:00, maintenance 07:00, links 08:00)
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-check:
    name: Check docs links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check links in docs/
        run: npm run lint:links:docs
